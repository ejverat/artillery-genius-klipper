[gcode_macro PRINT_START]
gcode:
    {action_respond_info("START PRINT (start.cfg)")}
    SMARTHOME                  ; performs G28 if needed + moves to X3/Y3/Z3
    LED_RED  ; Status: Heating
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}
    
    M117 Print starting...
    
    
    ; --- Basic setup ---
    G90
    M83
    M220 S100
    M221 S100
    
     ;--- Preheat bed & extruder simultaneously ---
    M140 S{BED_TEMP}    ; Start heating bed (don't wait)
    M104 S{EXTRUDER_TEMP} ; Start heating extruder to full temp (don't wait)

    ; --- Wait for bed temperature (only if too cold) ---
    ; Blocking wait only if current temperature is below target.
    {% if printer.heater_bed.temperature < BED_TEMP - 0.5 %}
        M190 S{BED_TEMP} ; Wait until target bed temperature is reached
    {% endif %}

    ; --- Wait for extruder temperature ---
    ; M109 always waits until full temperature is reached.
    M109 S{EXTRUDER_TEMP} ; Wait until extruder is ready (full temperature)
    
    
    ; --- Purge Line ---
    LED_BLUE   ; Status: ready
    
    G92 E0
    G1 Z0.5 F3000  ; lift slightly above bed
    G1 X10 Y10 Z0.25 F5000
    G1 X50 Y10 Z0.25 F1500 E10
    G1 X50 Y15 Z0.25 F5000
    G1 X10 Y15 Z0.25 F1500 E15
    G92 E0
    G1 Z0.5 F3000  ; Lift nozzle slightly after purge
    
    ; --- Print start position ---
    LED_WHITE  ; Status: Printing
    G1 X5 Y20 Z0.25 F5000
    
    
    M117 Print running!
