[gcode_macro SMARTHOME]
gcode:
    LED_GRUEN
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}

[gcode_macro MOVE_CENTER]
gcode:
    SMARTHOME
    G90
    G1 Z20 F3000        ; Sicherer Z-Abstand
    G1 X110 Y110 F9000  ; Mitte des Bettes (220x220)
    

[gcode_macro PRINT_BED_CHANGE]
gcode:
    SMARTHOME
    G90
    G1 Z50 F3000        ; Sicherer Z-Abstand
    G1 X220 Y220 F9000  ; Mitte des Bettes (220x220)
    
    G1 Z20 F3000        ; Sicherer Z-Abstand
    

[gcode_macro PID_EXTRUDER]
gcode:
    M106 S255
    {% set TARGET_TEMP = params.TARGET_TEMP|default(210)|float %} 
    PID_CALIBRATE HEATER=extruder TARGET={TARGET_TEMP}

[gcode_macro PID_BED]
gcode:
    {% set TARGET_TEMP = params.TARGET_TEMP|default(60)|float %}
    PID_CALIBRATE HEATER=heater_bed TARGET={TARGET_TEMP}

; === CORRECTED PAUSE/RESUME/CANCEL MACROS WITH SAVE/RESTORE ===

[gcode_macro PAUSE]
description: Safely pauses the print
rename_existing: BASE_PAUSE
gcode:
    M400                           ; Finish all movements
    SAVE_GCODE_STATE NAME=PAUSE_state  ; saves Z before we raise it

    M117 PAUSE - Time for filament change
    LED_BLUE

    G91
    G1 E-2 F3000
    G1 Z10 F3000                   ; Raise Z slightly for safety
    G90

    M117 Paused - Resume to continue
    BASE_PAUSE


[gcode_macro RESUME]
description: Correctly resumes the print
rename_existing: BASE_RESUME
gcode:
    M117 RESUME - Continuing print
    LED_BLUE

    ; Restore print position exactly
    RESTORE_GCODE_STATE NAME=PAUSE_state

    
    G91
    ;G1 E2 F3000 Optional: small extrusion to re-prime filament
    G90

    M117 Print continues...
    LED_WHITE

    BASE_RESUME


[gcode_macro CANCEL_PRINT]
description: Safely cancels the print
rename_existing: BASE_CANCEL_PRINT
gcode:
    {action_respond_info("CANCEL PRINT (macros.cfg)")}
    M117 Print cancelled
    LED_RED

    BASE_CANCEL_PRINT

    TURN_OFF_HEATERS
    M106 S0                         ; Fan off

    G91
    G1 Z10 F3000
    G90
    G1 X0 Y200 F6000                ; Head to front (adjust as needed)

    M117 Print cancelled - Heaters off
