###################################################################################
############################## Custom Macros ######################################
###################################################################################
[gcode_macro PARK_MACRO]
# default_parameter_X: 0
# default_parameter_Y: 0
# default_parameter_Z: 30
gcode:
	M117 PARKING..
	G91
	G1 E-3.0 F1500
	G1 Z{Z}
	G90
	G1 X{X} Y{Y} F3000
	
[gcode_macro UNLOAD]
gcode:
	G91
	G1 E5.0 F1200
	G1 E-50.0 F2000
	G1 E-50.0 F5000
	G90
        
[gcode_macro M600]
gcode:
	PAUSE_MACRO
	UNLOAD

[gcode_macro PAUSE_MACRO]
gcode:
	PAUSE
	PARK_MACRO
	
[gcode_macro PURGE]
gcode:
	M117 PURGING..
	G91
	G1 E45.0 F250
	G90
        
[gcode_macro LOAD_FILAMENT]
gcode:
	M117  LOADING...
	G91
	G1 E25.0 F1000
	G1 E50.0 F2000
	G4 P900
	G1 E20.0 F250
	G90

[gcode_macro RESUME_MACRO]
gcode:
	M117  RESUMING...
	RESUME

[gcode_macro START_PRINT]
description:
  "G-code to run at the start of a print.
  Replace your slicer's start G-code with this.
  Check the README for more details on usage.
  @param {int} [HOTEND=200] - The target hotend temp
  @param {int} [BED=60] - The target bed temp
  @param {bool} [RELATIVE_E_MODE=false] - Whether the extruder should be in relative mode
  @param {bool} [PROBE=false] - Whether or not to build a new bed mesh
  @param {int,int} [PROBE_AREA_START=min,min] - Start of area to probe
  @param {int,int} [PROBE_AREA_END=max,max] - End of area to probe"
gcode:
  {% set hotend_temp = params.HOTEND|default(200)|int %}
  {% set bed_temp = params.BED|default(60)|int %}
  {% set relative_extruder = params.RELATIVE_E_MODE|default(false)|string %}
  {% set probe = params.PROBE|default(false)|string %}
  {% set probe_area_start = params.PROBE_AREA_START|default(printer.toolhead.axis_minimum.x,printer.toolhead.axis_minimum.y)|string %}
  {% set probe_area_end = params.PROBE_AREA_END|default(printer.toolhead.axis_maximum.x,printer.toolhead.axis_maximum.y)|string %}

  {action_respond_info("START PRINT (printer.cfg)")}
  # POWER_ON_PRINTER ;ensure the printer is on

  G28 ;Home

  G90 ;Absolute positioning

  {% if relative_extruder|lower == 'true' %}
    M83 ;Set extruder to relative mode
  {% else %}
    M82 ;Set extruder to absolute mode
  {% endif %}

  LEDRED
  M140 S{bed_temp} ;Start heating bed
  M104 S{hotend_temp * 0.65} T0 ;Start heating hotend, but don't wait
  G4 S30 ; allow partial nozzle warmup

  M190 S{bed_temp} ;Wait for bed to reach temp target
  #Z_TILT_ADJUST

  G1 X115 Y115 F6000 ;Move nozzle to center
  PROBE_EDDY_NG_TAP  ;Perform nozzle tap

  BED_MESH_CALIBRATE METHOD=rapid_scan
  # BED_MESH_PROFILE LOAD=default ;load bed mesh profile
  #
  M104 S{hotend_temp} T0 ;Start heating hotend, but don't wait

  LEDBLUE
  SMART_PARK

  M109 S{hotend_temp} T0 ;Finish heating hotend

  LEDGREEN
  LINE_PURGE

  LEDWHITE
	
[gcode_macro END_PRINT]
gcode:
    {action_respond_info("END_PRINT (printer.cfg)")}
    M117 END PRINT
    # Turn off bed, extruder, and fan
    M140 S0
    M104 S0
    M106 S0
    # Reset extruder counter to 0
    G92 E0
    # Move nozzle away from print while retracting
    G90
    G1 X10 Y200 E-3 F300
    # Raise nozzle by 10mm
    G91
    G1 Z30 F3000
    G90
    # Clear values
    PROBE_EDDY_NG_SET_TAP_OFFSET VALUE=0
    BED_MESH_CLEAR
    # Disable steppers
    M84
    LEDOFF

#### PID ####
[gcode_macro PID_EXTRUDER]
description: Extruder temperature calibration / Calibra la temperatura del extrusor.
gcode:
    {% set T = params.T|default(195)|int %}
    	M117 Homing...
	G28
	M117 Extruder PID calibration...
    	M106 S255
	PID_CALIBRATE HEATER=extruder TARGET={T}
	M107
	SAVE_CONFIG

[gcode_macro PID_BED]
description: Bed temperature calibration / Calibra la temperatura de la cama.
gcode:
    {% set T = params.T|default(45)|int %}
    	M117 Homing...
	G28
	M117 Bed PID calibration...
	PID_CALIBRATE HEATER=heater_bed TARGET={T}
	SAVE_CONFIG

[gcode_macro PID_ALL]
description: Heater and Bed temperature calibration / Calibra la temperatura del extrusor y la cama
gcode:
    {% set TE = params.TE|default(195)|int %}
    {% set TB = params.TB|default(45)|int %}
    	M117 Homing...
	G28
	M117 Extruder PID calibration...
    	M106 S255
	PID_CALIBRATE HEATER=extruder TARGET={TE}
	M107
	M117 Bed PID calibration...
	PID_CALIBRATE HEATER=heater_bed TARGET={TB}
	SAVE_CONFIG

[pause_resume]
recover_velocity: 50

[display_status]

; === CORRECTED PAUSE/RESUME/CANCEL MACROS WITH SAVE/RESTORE ===

[gcode_macro PAUSE]
description: Safely pauses the print
rename_existing: BASE_PAUSE
gcode:
    M400                           ; Finish all movements
    SAVE_GCODE_STATE NAME=PAUSE_state  ; saves Z before we raise it

    M117 PAUSE - Time for filament change
    LEDBLUE

    G91
    G1 E-2 F3000
    G1 Z10 F3000                   ; Raise Z slightly for safety
    G90

    M117 Paused - Resume to continue
    BASE_PAUSE


[gcode_macro RESUME]
description: Correctly resumes the print
rename_existing: BASE_RESUME
gcode:
    M117 RESUME - Continuing print
    LEDBLUE

    ; Restore print position exactly
    RESTORE_GCODE_STATE NAME=PAUSE_state

    
    G91
    ;G1 E2 F3000 Optional: small extrusion to re-prime filament
    G90

    M117 Print continues...
    LEDWHITE

    BASE_RESUME


[gcode_macro CANCEL_PRINT]
description: Safely cancels the print
rename_existing: BASE_CANCEL_PRINT
gcode:
    {action_respond_info("CANCEL PRINT (printer.cfg)")}
    M117 Print cancelled
    LEDRED

    BASE_CANCEL_PRINT

    TURN_OFF_HEATERS
    M106 S0                         ; Fan off

    G91
    G1 Z10 F3000
    G90
    G1 X0 Y200 F6000                ; Head to front (adjust as needed)

    M117 Print cancelled - Heaters off
	
