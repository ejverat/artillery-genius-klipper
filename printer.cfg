[include shell_command.cfg]
[include KAMP_Settings.cfg]
[include maintenance.cfg]
[include btteddy-ng.cfg]

###################################################################################
##########################Printer General Settings#################################
###################################################################################
[printer]
kinematics: cartesian
max_velocity: 200
max_accel: 2000
max_z_velocity: 50
max_z_accel: 100
square_corner_velocity: 5.0

#####################################
#               ACCEL               #
#####################################

#[include mpu.cfg]

[input_shaper]
#shaper_freq_x: 43.26
#shaper_freq_y: 45.28
#shaper_type: mzv
#shaper_freq_x: 0
shaper_freq_y: 0
#shaper_type_x: mzv
shaper_type_y: mzv

[exclude_object]

[virtual_sdcard]
path: /home/pi/artillerygenius_data/gcodes
on_error_gcode: CANCEL_PRINT

[mcu]
serial: /dev/serial/by-path/platform-xhci-hcd.1.auto-usb-0:1.2:1.0-port0

[bed_screws]
screw1: 40,40
screw2: 190,40
screw3: 190,190
screw4: 40,190


# This file contains common pin mappings for RAMPS (v1.3 and later)
# boards. RAMPS boards typically use a firmware compiled for the AVR
# atmega2560 (though other AVR chips are also possible).
###################################################################################
###################################Steppers########################################
###################################################################################
[stepper_x]
step_pin: ar54
dir_pin: ar55
enable_pin: !ar38
microsteps: 16
rotation_distance: 39.820
endstop_pin: ^!ar3
position_min: -1
position_endstop: 0
position_max: 223
homing_speed: 50

[stepper_y]
step_pin: ar60
dir_pin: ar61
enable_pin: !ar56
microsteps: 16
rotation_distance: 39.813
endstop_pin: ^!ar14
position_min: 0
position_endstop: 0
position_max: 227
homing_speed: 50

[stepper_z]
step_pin: ar46
dir_pin: !ar48
enable_pin: !ar62
microsteps: 16
rotation_distance: 7.990
endstop_pin: probe:z_virtual_endstop
position_min: -3   # DELETE WITHOUT BLTOUCH
position_max: 250
homing_speed: 30   # 10.0 WITHOUT BLTOUCH
second_homing_speed: 1
# NO BLTOUCH config
# endstop_pin: ^!ar18
# position_endstop: 0
# homing_speed: 10.0
# homing_retract_dist: 3.0
# homing_retract_speed: 25
# second_homing_speed: 5.0
# #######################

[stepper_z1]
step_pin: ar36
dir_pin: !ar34
enable_pin: !ar30
microsteps: 16
rotation_distance: 7.990

[z_tilt]
horizontal_move_z: 2.0
z_positions: 
     20,115
     210,115

points: 
     20,115
     210,115
speed: 100

[gcode_macro Z_TILT_ADJUST]
rename_existing: _Z_TILT_ADJUST
gcode:
    SAVE_GCODE_STATE NAME=STATE_Z_TILT
    BED_MESH_CLEAR
    {% if not printer.z_tilt.applied %}
    _Z_TILT_ADJUST horizontal_move_z=8 retry_tolerance=1
    {% endif %}
    _Z_TILT_ADJUST horizontal_move_z=2
    RESTORE_GCODE_STATE NAME=STATE_Z_TILT

[screws_tilt_adjust]
screw4: 188,218
screw4_name: back right

screw3: 45,218
screw3_name: back left

screw2: 45,78
screw2_name: front left

screw1: 188,78
screw1_name: front right

speed: 150.0
screw_thread: CW-M5

###################################################################################
###################################################################################
###################################################################################

